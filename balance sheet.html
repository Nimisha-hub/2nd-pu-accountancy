<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Balance Sheet</title>

<style>
    /* TOP NAV */

.top-nav{
display:flex;
justify-content:flex-end;
margin-bottom:18px;
}

/* BACK BUTTON */

.back-btn{
padding:14px 24px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#4d6fff,#7a5cff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 18px rgba(77,111,255,0.25);
}

.back-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 24px rgba(77,111,255,0.35);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
min-height:100vh;
overflow-x:hidden;
}

.main{
display:grid;
grid-template-columns:68% 32%;
gap:20px;
align-items:start;
}

.sheet-box{
background:#fff;
border-radius:24px;
padding:24px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
position:relative;
}

.title{
text-align:center;
font-size:42px;
font-weight:700;
margin-bottom:20px;
}

.top-tools{
display:flex;
gap:12px;
margin-bottom:20px;
flex-wrap:wrap;
}

.top-tools button{
background:#111;
color:#fff;
border:none;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:15px;
transition:0.25s;
}

.top-tools button:hover{
transform:translateY(-2px);
background:#333;
}

.active-tool{
background:#4d6fff !important;
}

.table-wrapper{
position:relative;
overflow:visible;
width:100%;
}

.balance-table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
background:white;
position:relative;
z-index:2;
}

.balance-table th,
.balance-table td{
border:2px solid #333;
padding:12px;
height:72px;
vertical-align:middle;
transition:0.2s;
position:relative;
}

.balance-table th{
background:#eef2ff;
font-size:22px;
}

.balance-table td:hover{
background:#f8f9ff;
}

.balance-table input{
width:100%;
height:100%;
border:none;
outline:none;
font-size:18px;
background:transparent;
padding:4px;
}

.typing-cell{
cursor:text;
}

.typing-cell:focus-within{
background:#eef3ff !important;
}

.dropzone.hover{
background:#dfe9ff !important;
}

.amount-col{
width:160px;
}

.total-box{
font-weight:bold;
font-size:20px;
background:#fafafa;
}

/* RIGHT PANEL */

.cards-panel{
background:#fff;
border-radius:24px;
padding:22px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

.cards-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.cards-header h2{
font-size:34px;
}

.generate-box{
display:flex;
gap:12px;
margin-bottom:18px;
}

.generate-box input{
flex:1;
height:58px;
border:2px solid #ddd;
border-radius:18px;
padding:0 16px;
font-size:17px;
}

.generate-box button{
width:130px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:16px;
cursor:pointer;
}

.cards-scroll{
display:flex;
flex-wrap:wrap;
gap:14px;
align-content:flex-start;
}

.card{
width:170px;
min-height:100px;
background:white;
border-radius:20px;
padding:14px;
border-left:6px solid #4a74ff;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
cursor:grab;
transition:0.25s;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card.cr{
border-left-color:#22c55e;
}

.card:hover{
transform:translateY(-4px);
}

.badge{
display:inline-block;
padding:5px 12px;
border-radius:20px;
background:#e9efff;
color:#4a74ff;
font-size:12px;
font-weight:700;
margin-bottom:10px;
}

.card.cr .badge{
background:#e9fff0;
color:#22c55e;
}

.card h4{
font-size:18px;
margin-bottom:6px;
word-break:break-word;
}

.card p{
font-size:20px;
font-weight:bold;
}

.drag{
margin-top:10px;
text-align:right;
color:#aaa;
font-size:12px;
}

/* CANVAS */

#drawCanvas{
position:absolute;
top:0;
left:0;
z-index:1000;
pointer-events:none;
}

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>
<div class="top-nav">

<button class="back-btn" onclick="goBack()">
← Back
</button>

</div>
<div class="main">

<!-- LEFT -->

<div class="sheet-box">

<div class="top-tools">

<button onclick="addRow()">
+ Add Row
</button>

<button onclick="calculateTotal()">
Calculate
</button>

<button onclick="enableTyping()">
⌨ Typing
</button>

<button id="pencilBtn" onclick="setTool('pencil')">
✏ Pencil
</button>

<button id="eraserBtn" onclick="setTool('eraser')">
🧽 Eraser
</button>

<button onclick="clearCanvas()">
🧹 Clear Drawing
</button>

<button onclick="clearTable()">
❌ Clear Table
</button>

</div>

<div class="title">
Balance Sheet
</div>

<div class="table-wrapper" id="tableWrapper">

<canvas id="drawCanvas"></canvas>

<table class="balance-table">

<tr>
<th>Liabilities</th>
<th class="amount-col">Amount</th>
<th>Assets</th>
<th class="amount-col">Amount</th>
</tr>

<tbody id="tableBody">

<tr>

<td class="dropzone typing-cell">
<input placeholder="Type liabilities">
</td>

<td class="dropzone amount-col typing-cell">
<input placeholder="Amount">
</td>

<td class="dropzone typing-cell">
<input placeholder="Type assets">
</td>

<td class="dropzone amount-col typing-cell">
<input placeholder="Amount">
</td>

</tr>

<tr>
<td class="dropzone typing-cell"><input></td>
<td class="dropzone amount-col typing-cell"><input></td>
<td class="dropzone typing-cell"><input></td>
<td class="dropzone amount-col typing-cell"><input></td>
</tr>

<tr>
<td class="dropzone typing-cell"><input></td>
<td class="dropzone amount-col typing-cell"><input></td>
<td class="dropzone typing-cell"><input></td>
<td class="dropzone amount-col typing-cell"><input></td>
</tr>

</tbody>

<tr>

<td class="total-box">
Total
</td>

<td class="total-box amount-col" id="leftTotal">
0
</td>

<td class="total-box">
Total
</td>

<td class="total-box amount-col" id="rightTotal">
0
</td>

</tr>

</table>

</div>

</div>

<!-- RIGHT -->

<div class="cards-panel">

<div class="cards-header">

<h2>Entry Cards</h2>

<span>Drag → table</span>

</div>

<div class="generate-box">

<input
id="cardInput"
placeholder="Example: Building 12000"
>

<button onclick="generateCard()">
Generate
</button>

</div>

<div class="cards-scroll" id="cardsContainer">

</div>

</div>

</div>

<script>
    function goBack(){

window.location.href="index.html";

}

/* CARD GENERATE */

function generateCard(){

let text =
document.getElementById("cardInput").value.trim();

if(text==="") return;

let amountMatch =
text.match(/\d[\d,]*/);

let amount =
amountMatch ? amountMatch[0] : "";

let particulars =
text.replace(amount,"").trim();

let type =
particulars.toLowerCase().includes("to")
? "DR"
: "CR";

let card =
document.createElement("div");

card.className =
type==="DR"
? "card"
: "card cr";

card.draggable = true;

let id = "card"+Date.now();

card.id = id;

card.dataset.particular = particulars;
card.dataset.amount = amount;

card.addEventListener("dragstart",drag);

card.innerHTML = `

<div class="badge">${type}</div>

<h4>${particulars}</h4>

<p>Amount: ${amount}</p>

<div class="drag">drag</div>

`;

document.getElementById("cardsContainer")
.appendChild(card);

document.getElementById("cardInput").value="";

}

/* ENTER */

document.getElementById("cardInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
generateCard();
}

});

/* DRAG */

function drag(ev){

ev.dataTransfer.setData(
"text",
ev.target.id
);

}

/* ENABLE DROP */

function enableDropZone(cell){

cell.addEventListener("dragover",function(ev){

ev.preventDefault();
cell.classList.add("hover");

});

cell.addEventListener("dragleave",function(){

cell.classList.remove("hover");

});

cell.addEventListener("drop",function(ev){

ev.preventDefault();

cell.classList.remove("hover");

let data =
ev.dataTransfer.getData("text");

let card =
document.getElementById(data);

if(!card) return;

let particulars =
card.dataset.particular;

let amount =
card.dataset.amount;

let row =
cell.parentElement;

let cells =
row.querySelectorAll("td");

let index =
[...cells].indexOf(cell);

if(index===0 || index===2){

cells[index]
.querySelector("input")
.value = particulars;

cells[index+1]
.querySelector("input")
.value = amount;

}

card.remove();

});

}

/* ENABLE CELLS */

document.querySelectorAll(".dropzone")
.forEach(enableDropZone);

/* CLICK ANYWHERE TO TYPE */

document.querySelectorAll(".typing-cell")
.forEach(enableTypingClick);

function enableTypingClick(cell){

cell.addEventListener("click",function(){

let input = cell.querySelector("input");

if(input){
input.focus();
}

});

}

/* ADD ROW */

function addRow(){

let row =
document.createElement("tr");

row.innerHTML = `

<td class="dropzone typing-cell">
<input>
</td>

<td class="dropzone amount-col typing-cell">
<input>
</td>

<td class="dropzone typing-cell">
<input>
</td>

<td class="dropzone amount-col typing-cell">
<input>
</td>

`;

document.getElementById("tableBody")
.appendChild(row);

row.querySelectorAll(".dropzone")
.forEach(enableDropZone);

row.querySelectorAll(".typing-cell")
.forEach(enableTypingClick);

resizeCanvas();

}

/* CALCULATE */

function calculateTotal(){

let rows =
document.querySelectorAll("#tableBody tr");

let left = 0;
let right = 0;

rows.forEach(r=>{

let inputs =
r.querySelectorAll("input");

left +=
parseFloat(
inputs[1].value.replace(/,/g,'')
) || 0;

right +=
parseFloat(
inputs[3].value.replace(/,/g,'')
) || 0;

});

document.getElementById("leftTotal")
.innerText = left;

document.getElementById("rightTotal")
.innerText = right;

}

/* CLEAR TABLE */

function clearTable(){

document.querySelectorAll(
".balance-table input"
).forEach(input=>{

input.value = "";

});

document.getElementById("leftTotal")
.innerText = "0";

document.getElementById("rightTotal")
.innerText = "0";

document.getElementById("cardsContainer")
.innerHTML = "";

}

/* TYPING ALWAYS ENABLED */

function enableTyping(){

document.querySelectorAll(
".balance-table input"
).forEach(input=>{

input.disabled = false;

});

canvas.style.pointerEvents = "none";

alert("Typing Enabled");

}

/* DRAWING */

const canvas =
document.getElementById("drawCanvas");

const wrapper =
document.getElementById("tableWrapper");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){

canvas.width =
wrapper.scrollWidth;

canvas.height =
wrapper.scrollHeight;

}

resizeCanvas();

window.addEventListener(
"resize",
resizeCanvas
);

let drawing = false;
let tool = "pencil";

function setTool(selectedTool){

tool = selectedTool;

canvas.style.pointerEvents = "auto";

document.getElementById("pencilBtn")
.classList.remove("active-tool");

document.getElementById("eraserBtn")
.classList.remove("active-tool");

if(tool==="pencil"){

document.getElementById("pencilBtn")
.classList.add("active-tool");

}else{

document.getElementById("eraserBtn")
.classList.add("active-tool");

}

}

/* START DRAW */

canvas.addEventListener(
"mousedown",
function(e){

drawing = true;

ctx.beginPath();

ctx.moveTo(
e.offsetX,
e.offsetY
);

}
);

/* DRAW */

canvas.addEventListener(
"mousemove",
function(e){

if(!drawing) return;

ctx.lineCap = "round";

if(tool==="eraser"){

ctx.globalCompositeOperation =
"destination-out";

ctx.lineWidth = 30;

}else{

ctx.globalCompositeOperation =
"source-over";

ctx.strokeStyle = "#111";

ctx.lineWidth = 4;

}

ctx.lineTo(
e.offsetX,
e.offsetY
);

ctx.stroke();

}
);

/* STOP */

canvas.addEventListener(
"mouseup",
function(){

drawing = false;

}
);

canvas.addEventListener(
"mouseleave",
function(){

drawing = false;

}
);

/* CLEAR DRAWING */

function clearCanvas(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

</script>

</body>
</html>
