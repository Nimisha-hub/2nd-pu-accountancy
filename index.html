<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2nd PU Accountancy</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Poppins',sans-serif; background:#f5f5f5; overflow:hidden; }

.nav{
  height:72px; background:#fff; border-bottom:1px solid #ececec;
  display:flex; align-items:center; justify-content:space-between; padding:0 24px;
}
.brand{ display:flex; align-items:center; gap:14px; }
.logo{ width:46px; height:46px; border-radius:50%; object-fit:cover; }
.brand-text h1{ font-size:22px; }
.brand-text span{ font-size:12px; color:#777; }
.nav-right{ display:flex; gap:10px; align-items:center; }
.nav-btn{ border:none; padding:10px 18px; border-radius:12px; background:#f3f3f3; cursor:pointer; font-weight:600; font-family:'Poppins',sans-serif; }
.nav-btn:hover{ background:#ebebeb; }

/* SAVE ALL BTN */
.save-all-btn{
  border:none; padding:10px 18px; border-radius:12px;
  background:#1db56c; color:#fff; cursor:pointer; font-weight:600;
  font-family:'Poppins',sans-serif; display:flex; align-items:center; gap:7px;
  transition:.2s;
}
.save-all-btn:hover{ background:#17a05f; transform:translateY(-1px); }

/* HISTORY BTN */
.history-btn{
  border:none; padding:10px 18px; border-radius:12px;
  background:#f3f3f3; cursor:pointer; font-weight:600;
  font-family:'Poppins',sans-serif; display:flex; align-items:center; gap:7px;
}
.history-btn:hover{ background:#ebebeb; }

/* PRESENT BTN */
.present-btn{
  border:none; padding:10px 18px; border-radius:12px;
  background:#7c3aed; color:#fff; cursor:pointer; font-weight:600;
  font-family:'Poppins',sans-serif; display:flex; align-items:center; gap:7px;
  transition:.2s;
}
.present-btn:hover{ background:#6d28d9; transform:translateY(-1px); }

/* SPLIT BTN */
.split-wrap{ position:relative; }
.split-btn{
  border:none; padding:10px 18px; border-radius:12px;
  background:#111; color:#fff; cursor:pointer; font-weight:600;
  font-family:'Poppins',sans-serif; display:flex; align-items:center; gap:7px;
}
.split-btn:hover{ background:#333; }
.split-btn svg{ width:17px; height:17px; flex-shrink:0; }

/* DROPDOWN */
.split-dropdown{
  position:absolute; top:calc(100% + 10px); right:0;
  background:#fff; border:1px solid #eee; border-radius:16px;
  box-shadow:0 8px 28px rgba(0,0,0,.13); min-width:215px;
  z-index:9999; overflow:hidden; display:none;
}
.split-dropdown.open{ display:block; }
.split-dropdown a{
  display:flex; align-items:center; gap:11px; padding:13px 18px;
  font-size:14px; font-weight:500; color:#222; cursor:pointer;
  border-bottom:1px solid #f5f5f5; font-family:'Poppins',sans-serif;
}
.split-dropdown a:last-child{ border-bottom:none; }
.split-dropdown a:hover{ background:#f7f7f7; }
.split-dropdown a .pill{ margin-left:auto; font-size:10px; font-weight:700; background:#eee; color:#555; padding:2px 8px; border-radius:8px; }
.dd-overlay{ display:none; position:fixed; inset:0; z-index:999; }
.dd-overlay.open{ display:block; }

/* MAIN */
.main{ padding:16px; height:calc(100vh - 72px); }
.grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; height:100%; }
.grid.split-mode{ display:flex; flex-direction:row; gap:0; }
.left-col{ display:contents; }
.left-col.stacked{ display:flex; flex-direction:column; gap:16px; overflow:hidden; min-height:0; flex-shrink:0; }
.left-col.stacked .q-image-box{ flex:0 0 210px; }
.left-col.stacked .ws-box{ flex:1; min-height:0; overflow:hidden; }

.panel-resizer{
  display:none; width:10px; flex-shrink:0; cursor:col-resize;
  background:transparent; position:relative; z-index:10;
  align-items:center; justify-content:center;
}
.panel-resizer.visible{ display:flex; }
.panel-resizer::after{
  content:''; display:block; width:4px; height:48px;
  background:#ddd; border-radius:4px; transition:background .2s;
}
.panel-resizer:hover::after, .panel-resizer.dragging::after{ background:#aaa; }

.split-panel{ display:none; flex-direction:column; background:#fff; border-radius:22px; border:1px solid #ededed; overflow:hidden; min-width:200px; }
.split-panel.visible{ display:flex; }
.split-bar{ height:50px; background:#111; flex-shrink:0; display:flex; align-items:center; padding:0 18px; gap:12px; }
.split-bar span{ color:#fff; font-size:14px; font-weight:600; flex:1; }
.close-split-btn{ border:1.5px solid #555; background:transparent; color:#bbb; padding:5px 14px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; }
.close-split-btn:hover{ background:#333; color:#fff; }
.split-panel iframe{ flex:1; border:none; width:100%; height:100%; }

.box{ background:#fff; border-radius:22px; border:1px solid #ededed; display:flex; flex-direction:column; overflow:hidden; }
.box.right-box{ overflow:hidden; }
.box-head{ padding:18px; border-bottom:1px solid #f1f1f1; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.box-title{ font-size:16px; font-weight:600; }
.box-sub{ font-size:12px; color:#888; }

.upload-area{ flex:1; margin:18px; border:2px dashed #ddd; border-radius:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.upload-area p{ text-align:center; color:#777; line-height:1.8; }
#fileInp{ display:none; }
.q-preview{ display:none; flex:1; overflow:auto; padding:14px; }
.q-preview img{ width:100%; border-radius:16px; }

.toolbar{ padding:14px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex-shrink:0; }
.tool{ border:none; padding:10px 16px; border-radius:12px; cursor:pointer; font-weight:600; font-family:'Poppins',sans-serif; }
.pencil{ background:#ffe8d9; }
.eraser{ background:#e7f0ff; }
.note{ background:#fff2c7; }
.clear{ background:#ffe5e5; }
.type-btn{ background:#eadcff; }
.size-wrap{ margin-left:auto; display:flex; align-items:center; gap:10px; }

.main-canvas-wrap{
  position:relative; min-height:600px;
  background:repeating-linear-gradient(to bottom,#fff 0px,#fff 31px,#f1f1f1 32px);
  overflow:visible;
}
.ws-scroll{ flex:1; overflow-y:auto; overflow-x:hidden; min-height:0; }
#wsCanvas{ position:absolute; width:100%; height:100%; top:0; left:0; }

/* ── STICKY & TYPE BOX ── */
.sticky{ position:absolute; width:250px; height:180px; min-width:80px; min-height:80px; background:#fff2a8; border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.08); overflow:hidden; border:1px solid #f0d76d; z-index:100; }
.sticky-header{ height:40px; background:#ffe978; display:flex; align-items:center; justify-content:space-between; padding:0 10px; cursor:move; }
.sticky-title{ font-size:13px; font-weight:600; }
.remove-btn{ width:24px; height:24px; border:none; border-radius:50%; cursor:pointer; background:#ffd6d6; }
.sticky textarea{ width:100%; height:calc(100% - 40px); border:none; outline:none; resize:none; background:transparent; padding:10px; font-family:'Poppins',sans-serif; }

.type-box{ position:absolute; width:250px; height:140px; min-width:80px; min-height:80px; background:#fff; border:2px dashed #a66cff; border-radius:14px; overflow:hidden; z-index:120; }
.type-header{ height:40px; background:#f1e5ff; display:flex; justify-content:flex-end; align-items:center; padding:0 10px; cursor:move; }
.type-content{ width:100%; height:calc(100% - 40px); padding:10px; outline:none; overflow:auto; }

.resize-handle{ position:absolute; background:transparent; }
.resize-handle.br{ width:16px; height:16px; right:0; bottom:0; cursor:nwse-resize; }
.resize-handle.bl{ width:16px; height:16px; left:0; bottom:0; cursor:nesw-resize; }
.resize-handle.tr{ width:16px; height:16px; right:0; top:0; cursor:nesw-resize; }
.resize-handle.tl{ width:16px; height:16px; left:0; top:0; cursor:nwse-resize; }
.resize-handle.top{ top:0; left:16px; width:calc(100% - 32px); height:10px; cursor:ns-resize; }
.resize-handle.bottom{ bottom:0; left:16px; width:calc(100% - 32px); height:10px; cursor:ns-resize; }
.resize-handle.left{ left:0; top:16px; width:10px; height:calc(100% - 32px); cursor:ew-resize; }
.resize-handle.right{ right:0; top:16px; width:10px; height:calc(100% - 32px); cursor:ew-resize; }

/* ─────────────────────────────────────────
   PRESENT / ANIMATION MODE
───────────────────────────────────────── */
.present-overlay{
  display:none; position:fixed; inset:0; z-index:5000;
  background:transparent; pointer-events:none;
  flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:32px;
}
.present-overlay.active{ display:flex; }
.present-controls{ pointer-events:auto; }
.present-overlay.active{ display:flex; }

/* Hide all elements in present mode, show one by one */
.present-mode .sticky,
.present-mode .type-box{
  opacity:0;
  transform:translateY(18px) scale(.96);
  pointer-events:none;
  transition: opacity .45s cubic-bezier(.16,1,.3,1),
              transform .45s cubic-bezier(.16,1,.3,1);
}
.present-mode .sticky.revealed,
.present-mode .type-box.revealed{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}

.present-controls{
  display:flex; align-items:center; gap:14px;
  background:#fff; border-radius:20px; padding:12px 22px;
  box-shadow:0 8px 32px rgba(0,0,0,.22);
}
.present-controls button{
  border:none; padding:10px 22px; border-radius:12px; font-weight:700;
  font-family:'Poppins',sans-serif; cursor:pointer; font-size:14px; transition:.15s;
}
.pres-next{ background:#7c3aed; color:#fff; }
.pres-next:hover{ background:#6d28d9; }
.pres-prev{ background:#f3f3f3; }
.pres-prev:hover{ background:#e8e8e8; }
.pres-exit{ background:#ffe5e5; color:#cc0000; }
.pres-exit:hover{ background:#ffcccc; }
.pres-counter{ font-size:13px; color:#666; font-weight:600; min-width:70px; text-align:center; }

/* ─────────────────────────────────────────
   HISTORY PANEL
───────────────────────────────────────── */
.history-panel{
  display:none; position:fixed; top:0; right:0; bottom:0;
  width:380px; background:#fff; z-index:4000;
  box-shadow:-8px 0 32px rgba(0,0,0,.12);
  flex-direction:column; overflow:hidden;
}
.history-panel.open{ display:flex; }
.history-head{
  padding:20px 22px; border-bottom:1px solid #f0f0f0;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.history-head h2{ font-size:18px; font-weight:700; }
.close-hist-btn{ border:none; background:#f3f3f3; border-radius:10px; padding:7px 14px; cursor:pointer; font-weight:600; font-family:'Poppins',sans-serif; }
.close-hist-btn:hover{ background:#ebebeb; }
.history-list{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.hist-empty{ text-align:center; color:#aaa; margin-top:60px; font-size:14px; }
.hist-card{
  border:1px solid #eeeeee; border-radius:16px; overflow:hidden;
  transition:.2s;
}
.hist-card:hover{ box-shadow:0 4px 14px rgba(0,0,0,.08); }
.hist-card-head{
  padding:14px 16px; background:#fafafa;
  display:flex; align-items:center; justify-content:space-between;
}
.hist-card-head .hist-time{ font-size:12px; color:#888; }
.hist-card-head .hist-label{ font-size:14px; font-weight:600; }
.hist-card-actions{ display:flex; gap:8px; }
.hist-btn{ border:none; padding:6px 14px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; }
.hist-restore{ background:#e7f0ff; color:#2244cc; }
.hist-restore:hover{ background:#d0e3ff; }
.hist-pdf{ background:#fff2c7; color:#7a5500; }
.hist-pdf:hover{ background:#ffe99a; }
.hist-delete{ background:#ffe5e5; color:#cc0000; }
.hist-delete:hover{ background:#ffcccc; }
.hist-preview{ padding:12px 16px; border-top:1px solid #f5f5f5; font-size:12px; color:#777; line-height:1.7; }

/* TOAST */
.toast{
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(16px);
  background:#111; color:#fff; padding:11px 26px;
  border-radius:14px; font-size:13px; font-weight:600;
  opacity:0; transition:.3s; pointer-events:none; z-index:9999;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

@media(max-width:1000px){ body{ overflow:auto; } .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<nav class="nav">
  <div class="brand">
    <img src="camila.png" class="logo">
    <div class="brand-text">
      <h1>2nd PU Accountancy</h1>
      <span>Camila Paul</span>
    </div>
  </div>
  <div class="nav-right">

    <!-- SAVE ALL -->
    <button class="save-all-btn" onclick="saveAll()">💾 Save All</button>

    <!-- HISTORY -->
    <button class="history-btn" onclick="openHistory()">🕑 History</button>

    <!-- PRESENT MODE -->
    <button class="present-btn" onclick="startPresent()">▶ Present</button>

    <!-- SPLIT VIEW -->
    <div class="split-wrap">
      <button class="split-btn" onclick="toggleDD()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="8" height="18" rx="1.5"/>
          <rect x="14" y="3" width="8" height="18" rx="1.5"/>
        </svg>
        Split View &#9662;
      </button>
      <div class="split-dropdown" id="splitDD">
        <a onclick="openSplit('Revaluation.html','Revaluation A/c')">&#128202; Revaluation A/c <span class="pill">SPLIT</span></a>
        <a onclick="openSplit('partners capital.html','Capital A/c')">&#128188; Capital A/c <span class="pill">SPLIT</span></a>
        <a onclick="openSplit('balance sheet.html','Balance Sheet')">&#9878; Balance Sheet <span class="pill">SPLIT</span></a>
      </div>
    </div>

    <button class="nav-btn" onclick="window.location.href='Revaluation.html'">Revaluation</button>
    <button class="nav-btn" onclick="window.location.href='partners capital.html'">Capital A/c</button>
    <button class="nav-btn" onclick="window.location.href='balance sheet.html'">Balance Sheet</button>
  </div>
</nav>

<div class="dd-overlay" id="ddOverlay" onclick="closeDD()"></div>

<div class="main">
  <div class="grid" id="mainGrid">
    <div class="left-col" id="leftCol">

      <div class="box q-image-box" id="qImageBox">
        <div class="box-head">
          <div class="box-title">Question Image</div>
          <div class="box-sub" style="cursor:pointer" onclick="document.getElementById('fileInp').click()">Upload image</div>
        </div>
        <div class="upload-area" onclick="document.getElementById('fileInp').click()">
          <p><strong>Click to Upload</strong><br>PNG &bull; JPG</p>
        </div>
        <input type="file" id="fileInp" accept="image/*">
        <div class="q-preview" id="preview"><img id="qImg"></div>
      </div>

      <div class="box right-box ws-box" id="wsBox">
        <div class="box-head">
          <div class="box-title">Working Space</div>
          <div class="box-sub">Draw &bull; Notes &bull; Typing</div>
        </div>
        <div class="toolbar">
          <button class="tool pencil" id="pencilBtn">&#9998; Pencil</button>
          <button class="tool eraser" id="eraserBtn">&#129535; Eraser</button>
          <button class="tool note" onclick="addSticky(mainWrap)">&#128221; Add Note</button>
          <button class="tool type-btn" onclick="addTypeBox(mainWrap)">&#9000; Type</button>
          <button class="tool clear" onclick="clearMain()">&#128465; Clear</button>
          <div class="size-wrap">
            <span>Size</span>
            <input type="range" min="1" max="12" value="2" id="sizeSlider">
          </div>
        </div>
        <div class="ws-scroll" id="wsScroll">
          <div class="main-canvas-wrap" id="mainWrap">
            <canvas id="wsCanvas"></canvas>
          </div>
        </div>
      </div>

    </div>

    <div class="panel-resizer" id="panelResizer"></div>

    <div class="split-panel" id="splitPanel">
      <div class="split-bar">
        <span id="splitTitle">Revaluation A/c</span>
        <button class="close-split-btn" onclick="closeSplit()">&#x2715; Close Split</button>
      </div>
      <iframe id="splitFrame" src=""></iframe>
    </div>
  </div>
</div>

<!-- PRESENT MODE OVERLAY -->
<div class="present-overlay" id="presentOverlay">
  <div class="present-controls">
    <button class="pres-prev hist-btn" onclick="prevReveal()">◀ Prev</button>
    <span class="pres-counter" id="presCounter">0 / 0</span>
    <button class="pres-next" onclick="nextReveal()">Next ▶</button>
    <button class="pres-exit" onclick="exitPresent()">✕ Exit</button>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="history-panel" id="historyPanel">
  <div class="history-head">
    <h2>🕑 Save History</h2>
    <button class="close-hist-btn" onclick="closeHistory()">✕ Close</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ── TOAST ── */
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2400);
}

/* ── DROPDOWN ── */
function toggleDD(){ document.getElementById('splitDD').classList.toggle('open'); document.getElementById('ddOverlay').classList.toggle('open'); }
function closeDD(){ document.getElementById('splitDD').classList.remove('open'); document.getElementById('ddOverlay').classList.remove('open'); }

/* ── SPLIT ── */
var splitActive=false, leftPct=50, rightPct=50;
function openSplit(page,title){
  closeDD();
  var grid=document.getElementById('mainGrid');
  var leftCol=document.getElementById('leftCol');
  var wsBox=document.getElementById('wsBox');
  var splitPanel=document.getElementById('splitPanel');
  var resizer=document.getElementById('panelResizer');
  if(splitActive){ document.getElementById('splitFrame').src=page; document.getElementById('splitTitle').textContent=title; return; }
  leftCol.classList.add('stacked'); leftCol.appendChild(wsBox);
  grid.classList.add('split-mode');
  leftCol.style.width=leftPct+'%'; leftCol.style.marginRight='8px'; splitPanel.style.width=rightPct+'%';
  splitPanel.classList.add('visible'); resizer.classList.add('visible');
  document.getElementById('splitFrame').src=page; document.getElementById('splitTitle').textContent=title;
  splitActive=true; setTimeout(resizeCanvas,60);
}
function closeSplit(){
  var grid=document.getElementById('mainGrid'); var leftCol=document.getElementById('leftCol');
  var wsBox=document.getElementById('wsBox'); var splitPanel=document.getElementById('splitPanel'); var resizer=document.getElementById('panelResizer');
  grid.appendChild(wsBox); leftCol.classList.remove('stacked'); leftCol.style.width=''; leftCol.style.marginRight='';
  splitPanel.style.width=''; grid.classList.remove('split-mode'); splitPanel.classList.remove('visible'); resizer.classList.remove('visible');
  document.getElementById('splitFrame').src=''; splitActive=false; setTimeout(resizeCanvas,60);
}
(function(){
  var resizer=document.getElementById('panelResizer'); var dragging=false;
  resizer.addEventListener('mousedown',function(){ dragging=true; resizer.classList.add('dragging'); document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; });
  document.addEventListener('mousemove',function(e){
    if(!dragging||!splitActive) return;
    var grid=document.getElementById('mainGrid'); var rect=grid.getBoundingClientRect(); var totalW=rect.width; var x=e.clientX-rect.left;
    var lp=Math.min(80,Math.max(20,(x/totalW)*100)); var rp=100-lp;
    leftPct=lp; rightPct=rp;
    document.getElementById('leftCol').style.width=lp+'%'; document.getElementById('splitPanel').style.width=rp+'%'; resizeCanvas();
  });
  document.addEventListener('mouseup',function(){ if(dragging){ dragging=false; resizer.classList.remove('dragging'); document.body.style.cursor=''; document.body.style.userSelect=''; } });
})();

/* ── IMAGE ── */
document.getElementById('fileInp').addEventListener('change',function(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    document.querySelector('.upload-area').style.display='none';
    document.getElementById('preview').style.display='block';
    document.getElementById('qImg').src=ev.target.result;
    saveImageToStorage(ev.target.result);
  };
  reader.readAsDataURL(file);
});
function saveImageToStorage(dataUrl){ try{ localStorage.setItem('ws_question_img', dataUrl); }catch(e){} }
function loadImageFromStorage(){
  var d=localStorage.getItem('ws_question_img');
  if(d){ document.querySelector('.upload-area').style.display='none'; document.getElementById('preview').style.display='block'; document.getElementById('qImg').src=d; }
}

/* ── CANVAS ── */
var canvas=document.getElementById('wsCanvas');
var ctx=canvas.getContext('2d');
var mainWrap=document.getElementById('mainWrap');
var drawing=false, tool='pencil', size=2;
function resizeCanvas(){
  var saved=ctx.getImageData(0,0,canvas.width,canvas.height);
  canvas.width=mainWrap.offsetWidth; canvas.height=mainWrap.offsetHeight;
  ctx.putImageData(saved,0,0);
}
resizeCanvas(); window.addEventListener('resize',resizeCanvas);
function getPos(e,target){ var rect=target.getBoundingClientRect(); return{x:(e.touches?e.touches[0].clientX:e.clientX)-rect.left,y:(e.touches?e.touches[0].clientY:e.clientY)-rect.top}; }
var lx,ly;
canvas.addEventListener('mousedown',function(e){ drawing=true; var p=getPos(e,canvas); lx=p.x; ly=p.y; });
canvas.addEventListener('touchstart',function(e){ drawing=true; var p=getPos(e,canvas); lx=p.x; ly=p.y; });
canvas.addEventListener('mousemove',draw); canvas.addEventListener('touchmove',draw);
function draw(e){
  if(!drawing) return; e.preventDefault();
  var p=getPos(e,canvas);
  ctx.beginPath(); ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';
  ctx.strokeStyle='#ff6b35'; ctx.lineWidth=tool==='eraser'?size*10:size+2; ctx.lineCap='round';
  ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke();
  lx=p.x; ly=p.y;
}
window.addEventListener('mouseup',function(){ drawing=false; });
window.addEventListener('touchend',function(){ drawing=false; });
document.getElementById('pencilBtn').onclick=function(){ tool='pencil'; };
document.getElementById('eraserBtn').onclick=function(){ tool='eraser'; };
document.getElementById('sizeSlider').oninput=function(e){ size=parseInt(e.target.value); };
function clearMain(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

/* ── STICKY / TYPE BOX ── */
function nextY(parent){ var m=10; parent.querySelectorAll('.sticky,.type-box').forEach(function(el){ var b=el.offsetTop+el.offsetHeight+14; if(b>m)m=b; }); return m; }
function growWrap(parent){ var m=600; parent.querySelectorAll('.sticky,.type-box').forEach(function(el){ var b=el.offsetTop+el.offsetHeight+30; if(b>m)m=b; }); if(m>parent.offsetHeight){ parent.style.minHeight=m+'px'; resizeCanvas(); } }
function resizeHandles(){ return '<div class="resize-handle br"></div><div class="resize-handle bl"></div><div class="resize-handle tr"></div><div class="resize-handle tl"></div><div class="resize-handle top"></div><div class="resize-handle bottom"></div><div class="resize-handle left"></div><div class="resize-handle right"></div>'; }

var elementOrder = []; // tracks creation order for reveal

function addSticky(parent, data){
  var note=document.createElement('div'); note.className='sticky';
  note.style.left=(data&&data.left)||'20px'; note.style.top=(data&&data.top)||nextY(parent)+'px';
  if(data&&data.width) note.style.width=data.width;
  if(data&&data.height) note.style.height=data.height;
  note.innerHTML='<div class="sticky-header"><div class="sticky-title">Sticky Note</div><button class="remove-btn">&#x2715;</button></div><textarea placeholder="Write here..."></textarea>'+resizeHandles();
  if(data&&data.text) note.querySelector('textarea').value=data.text;
  parent.appendChild(note); growWrap(parent);
  note.querySelector('.remove-btn').onclick=function(){ note.remove(); elementOrder=elementOrder.filter(function(e){ return e!==note; }); };
  makeDraggable(note,note.querySelector('.sticky-header')); makeResizable(note);
  elementOrder.push(note);
  return note;
}

function addTypeBox(parent, data){
  var box=document.createElement('div'); box.className='type-box';
  box.style.left=(data&&data.left)||'20px'; box.style.top=(data&&data.top)||nextY(parent)+'px';
  if(data&&data.width) box.style.width=data.width;
  if(data&&data.height) box.style.height=data.height;
  box.innerHTML='<div class="type-header"><button class="remove-btn">&#x2715;</button></div><div class="type-content" contenteditable="true">Type here...</div>'+resizeHandles();
  if(data&&data.html) box.querySelector('.type-content').innerHTML=data.html;
  parent.appendChild(box); growWrap(parent);
  box.querySelector('.remove-btn').onclick=function(){ box.remove(); elementOrder=elementOrder.filter(function(e){ return e!==box; }); };
  makeDraggable(box,box.querySelector('.type-header')); makeResizable(box);
  elementOrder.push(box);
  return box;
}

function makeDraggable(el,handle){
  var ox=0,oy=0,drag=false;
  handle.addEventListener('mousedown',function(e){ drag=true; ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop; document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); });
  function mv(e){ if(!drag)return; el.style.left=(e.clientX-ox)+'px'; el.style.top=(e.clientY-oy)+'px'; }
  function up(){ drag=false; document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
}
function makeResizable(el){
  el.querySelectorAll('.resize-handle').forEach(function(h){
    h.addEventListener('mousedown',function(e){
      e.preventDefault(); e.stopPropagation();
      var sx=e.clientX,sy=e.clientY,sw=parseInt(getComputedStyle(el).width),sh=parseInt(getComputedStyle(el).height),sl=el.offsetLeft,st=el.offsetTop;
      function rs(e){
        var c=h.classList;
        if(c.contains('right'))  el.style.width=sw+(e.clientX-sx)+'px';
        if(c.contains('left'))   { el.style.width=sw-(e.clientX-sx)+'px'; el.style.left=sl+(e.clientX-sx)+'px'; }
        if(c.contains('bottom')) el.style.height=sh+(e.clientY-sy)+'px';
        if(c.contains('top'))    { el.style.height=sh-(e.clientY-sy)+'px'; el.style.top=st+(e.clientY-sy)+'px'; }
        if(c.contains('br'))     { el.style.width=sw+(e.clientX-sx)+'px'; el.style.height=sh+(e.clientY-sy)+'px'; }
        if(c.contains('bl'))     { el.style.width=sw-(e.clientX-sx)+'px'; el.style.left=sl+(e.clientX-sx)+'px'; el.style.height=sh+(e.clientY-sy)+'px'; }
        if(c.contains('tr'))     { el.style.width=sw+(e.clientX-sx)+'px'; el.style.height=sh-(e.clientY-sy)+'px'; el.style.top=st+(e.clientY-sy)+'px'; }
        if(c.contains('tl'))     { el.style.width=sw-(e.clientX-sx)+'px'; el.style.left=sl+(e.clientX-sx)+'px'; el.style.height=sh-(e.clientY-sy)+'px'; el.style.top=st+(e.clientY-sy)+'px'; }
      }
      function stop(){ document.removeEventListener('mousemove',rs); document.removeEventListener('mouseup',stop); }
      document.addEventListener('mousemove',rs); document.addEventListener('mouseup',stop);
    });
  });
}

/* ─────────────────────────────────────────
   SAVE ALL — persists working space to localStorage
   Accounts save themselves via their own keys.
───────────────────────────────────────── */
function saveAll(){
  // 1. Canvas drawing
  var canvasData = canvas.toDataURL();
  localStorage.setItem('ws_canvas', canvasData);

  // 2. All sticky notes and type boxes
  var elements = [];
  mainWrap.querySelectorAll('.sticky').forEach(function(el){
    elements.push({
      type:'sticky', left:el.style.left, top:el.style.top,
      width:el.style.width, height:el.style.height,
      text: el.querySelector('textarea').value
    });
  });
  mainWrap.querySelectorAll('.type-box').forEach(function(el){
    elements.push({
      type:'typebox', left:el.style.left, top:el.style.top,
      width:el.style.width, height:el.style.height,
      html: el.querySelector('.type-content').innerHTML
    });
  });
  localStorage.setItem('ws_elements', JSON.stringify(elements));

  showToast('✅ All saved! Refresh-safe.');
}

/* ─────────────────────────────────────────
   AUTO-LOAD on page start
───────────────────────────────────────── */
function loadAll(){
  loadImageFromStorage();

  // Canvas
  var cd = localStorage.getItem('ws_canvas');
  if(cd){
    var img=new Image();
    img.onload=function(){ resizeCanvas(); ctx.drawImage(img,0,0); };
    img.src=cd;
  }

  // Elements
  var els = localStorage.getItem('ws_elements');
  if(els){
    JSON.parse(els).forEach(function(d){
      if(d.type==='sticky') addSticky(mainWrap, d);
      else addTypeBox(mainWrap, d);
    });
  }
}

/* ─────────────────────────────────────────
   HISTORY — save snapshot + restore + PDF
───────────────────────────────────────── */
function getHistoryList(){
  return JSON.parse(localStorage.getItem('ws_history')||'[]');
}
function saveHistoryList(list){
  try{ localStorage.setItem('ws_history', JSON.stringify(list)); }catch(e){ showToast('⚠️ Storage full — delete old history entries'); }
}

function saveHistoryEntry(){
  var canvasData = canvas.toDataURL('image/jpeg',0.6); // compress for storage
  var elements = [];
  mainWrap.querySelectorAll('.sticky').forEach(function(el){
    elements.push({ type:'sticky', left:el.style.left, top:el.style.top, width:el.style.width, height:el.style.height, text:el.querySelector('textarea').value });
  });
  mainWrap.querySelectorAll('.type-box').forEach(function(el){
    elements.push({ type:'typebox', left:el.style.left, top:el.style.top, width:el.style.width, height:el.style.height, html:el.querySelector('.type-content').innerHTML });
  });

  // Collect account data from their own localStorage keys
  var accountData = {
    revaluation: localStorage.getItem('rev_table_data')||'',
    capital:     localStorage.getItem('cap_table_data')||'',
    balance:     localStorage.getItem('bs_table_data')||''
  };

  var entry = {
    id: Date.now(),
    time: new Date().toLocaleString(),
    canvas: canvasData,
    elements: elements,
    accounts: accountData,
    preview: elements.map(function(e){ return e.type==='sticky'? '📝 '+e.text.substring(0,40) : '⌨️ '+e.html.replace(/<[^>]+>/g,'').substring(0,40); }).join('\n')
  };

  var list = getHistoryList();
  list.unshift(entry);
  if(list.length>20) list=list.slice(0,20); // keep last 20
  saveHistoryList(list);
  return entry;
}

function openHistory(){
  renderHistoryList();
  document.getElementById('historyPanel').classList.add('open');
}
function closeHistory(){
  document.getElementById('historyPanel').classList.remove('open');
}

function renderHistoryList(){
  var list = getHistoryList();
  var container = document.getElementById('historyList');
  container.innerHTML='';
  if(!list.length){
    container.innerHTML='<p class="hist-empty">No history yet.<br>Click 💾 Save All to start.</p>';
    return;
  }
  list.forEach(function(entry){
    var card=document.createElement('div'); card.className='hist-card';
    card.innerHTML=
      '<div class="hist-card-head">' +
        '<div>' +
          '<div class="hist-label">📁 Session</div>' +
          '<div class="hist-time">'+entry.time+'</div>' +
        '</div>' +
        '<div class="hist-card-actions">' +
          '<button class="hist-btn hist-restore" onclick="restoreEntry(\''+entry.id+'\')">↩ Restore</button>' +
          '<button class="hist-btn hist-pdf" onclick="exportPDF(\''+entry.id+'\')">⬇ PDF</button>' +
          '<button class="hist-btn hist-delete" onclick="deleteEntry(\''+entry.id+'\')">✕</button>' +
        '</div>' +
      '</div>' +
      '<div class="hist-preview">'+(entry.preview||'(No notes/type boxes)')+' </div>';
    container.appendChild(card);
  });
}

function restoreEntry(id){
  var list=getHistoryList();
  var entry=list.find(function(e){ return e.id==id; });
  if(!entry) return;
  if(!confirm('Restore this session? Current working space will be replaced.')) return;

  // Clear current
  mainWrap.querySelectorAll('.sticky,.type-box').forEach(function(el){ el.remove(); });
  elementOrder=[];
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Restore canvas
  if(entry.canvas){
    var img=new Image();
    img.onload=function(){ resizeCanvas(); ctx.drawImage(img,0,0); };
    img.src=entry.canvas;
  }
  // Restore elements
  (entry.elements||[]).forEach(function(d){
    if(d.type==='sticky') addSticky(mainWrap,d);
    else addTypeBox(mainWrap,d);
  });
  // Restore account data
  if(entry.accounts){
    if(entry.accounts.revaluation) localStorage.setItem('rev_table_data', entry.accounts.revaluation);
    if(entry.accounts.capital)     localStorage.setItem('cap_table_data', entry.accounts.capital);
    if(entry.accounts.balance)     localStorage.setItem('bs_table_data',  entry.accounts.balance);
  }

  closeHistory();
  showToast('↩ Session restored!');
}

function deleteEntry(id){
  if(!confirm('Delete this history entry?')) return;
  var list=getHistoryList().filter(function(e){ return e.id!=id; });
  saveHistoryList(list);
  renderHistoryList();
  showToast('Deleted.');
}

/* ─────────────────────────────────────────
   SAVE ALL → also saves to history
───────────────────────────────────────── */
function saveAll(){
  // Live save
  localStorage.setItem('ws_canvas', canvas.toDataURL());
  var elements=[];
  mainWrap.querySelectorAll('.sticky').forEach(function(el){
    elements.push({type:'sticky',left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height,text:el.querySelector('textarea').value});
  });
  mainWrap.querySelectorAll('.type-box').forEach(function(el){
    elements.push({type:'typebox',left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height,html:el.querySelector('.type-content').innerHTML});
  });
  localStorage.setItem('ws_elements', JSON.stringify(elements));

  // History snapshot
  saveHistoryEntry();

  showToast('✅ Saved! History snapshot created.');
}

/* ─────────────────────────────────────────
   PDF EXPORT — working space screenshot
   + account data text tables
───────────────────────────────────────── */
function exportPDF(id){
  var list=getHistoryList();
  var entry = id ? list.find(function(e){ return e.id==id; }) : null;

  var { jsPDF } = window.jspdf;
  var doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  var pageW=210, margin=14, y=margin;

  // Title
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('2nd PU Accountancy — Session Export', margin, y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(120);
  doc.text((entry?entry.time:new Date().toLocaleString()), margin, y); y+=10;
  doc.setTextColor(0);

  // Working space screenshot
  var captureTarget = mainWrap;
  html2canvas(captureTarget, { backgroundColor:'#fff', scale:1.5, useCORS:true }).then(function(cvs){
    var imgData = cvs.toDataURL('image/jpeg',0.85);
    var imgW = pageW - margin*2;
    var imgH = (cvs.height/cvs.width)*imgW;
    if(y+imgH > 280){ doc.addPage(); y=margin; }
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('Working Space', margin, y); y+=6;
    doc.addImage(imgData,'JPEG',margin,y,imgW,Math.min(imgH,160)); y+=Math.min(imgH,160)+10;

    // Account data as text
    var accs = entry ? entry.accounts : {
      revaluation: localStorage.getItem('rev_table_data')||'',
      capital:     localStorage.getItem('cap_table_data')||'',
      balance:     localStorage.getItem('bs_table_data')||''
    };

    [['Revaluation A/c',accs.revaluation],['Capital A/c',accs.capital],['Balance Sheet',accs.balance]].forEach(function(pair){
      if(!pair[1]) return;
      if(y>260){ doc.addPage(); y=margin; }
      doc.setFont('helvetica','bold'); doc.setFontSize(12);
      doc.text(pair[0], margin, y); y+=6;
      doc.setFont('helvetica','normal'); doc.setFontSize(9);
      try{
        var rows=JSON.parse(pair[1]);
        rows.forEach(function(row){
          var line=row.cells.join(' | ');
          var lines=doc.splitTextToSize(line, pageW-margin*2);
          if(y+lines.length*5>280){ doc.addPage(); y=margin; }
          doc.text(lines, margin, y); y+=lines.length*5;
        });
      }catch(e){}
      y+=8;
    });

    doc.save('accountancy-session-'+(entry?entry.id:Date.now())+'.pdf');
    showToast('📄 PDF exported!');
  });
}

/* ─────────────────────────────────────────
   PRESENT / ANIMATION REVEAL MODE
   - All notes/typeboxes start hidden
   - "Next" reveals them one by one with
     a smooth pop-in animation (PPT style)
   - "Prev" hides the last revealed one
───────────────────────────────────────── */
var presentActive = false;
var revealIndex = 0;
var revealList = [];

function startPresent(){
  // Collect all current notes/typeboxes in creation order
  revealList = Array.from(mainWrap.querySelectorAll('.sticky,.type-box'));
  if(!revealList.length){ showToast('Add some notes or type boxes first!'); return; }

  revealIndex = 0;
  presentActive = true;

  // Hide all
  mainWrap.classList.add('present-mode');
  revealList.forEach(function(el){ el.classList.remove('revealed'); });

  document.getElementById('presentOverlay').classList.add('active');
  updatePresCounter();
  showToast('▶ Present mode — click Next to reveal');
}

function nextReveal(){
  if(revealIndex >= revealList.length){ showToast('All revealed! Click Exit to finish.'); return; }
  var el = revealList[revealIndex];
  el.classList.add('revealed');
  revealIndex++;
  updatePresCounter();
}

function prevReveal(){
  if(revealIndex <= 0){ showToast('Nothing to hide back.'); return; }
  revealIndex--;
  var el = revealList[revealIndex];
  el.classList.remove('revealed');
  updatePresCounter();
}

function exitPresent(){
  mainWrap.classList.remove('present-mode');
  revealList.forEach(function(el){ el.classList.remove('revealed'); el.style.opacity=''; el.style.transform=''; });
  document.getElementById('presentOverlay').classList.remove('active');
  presentActive = false;
  revealList = []; revealIndex = 0;
}

function updatePresCounter(){
  document.getElementById('presCounter').textContent = revealIndex + ' / ' + revealList.length;
}

/* ── INIT ── */
window.addEventListener('load', loadAll);
</script>
