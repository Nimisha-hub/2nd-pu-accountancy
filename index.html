<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2nd PU Accountancy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#fafafa;
  color:#222;
  overflow:hidden;
}

/* NAVBAR */

.nav{
  height:72px;
  background:#ffffff;
  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 26px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:46px;
  height:46px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #d8d8d8;
}

.brand-text h1{
  font-size:22px;
  font-weight:700;
}

.brand-text span{
  font-size:12px;
  color:#888;
}

.nav-right{
  display:flex;
  gap:10px;
}

.nav-btn{
  border:none;
  padding:10px 18px;
  border-radius:14px;
  background:#f4f4f4;
  color:#444;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
}

.nav-btn.active{
  background:#dceeff;
  color:#1363c6;
}

/* MAIN */

.main{
  padding:16px;
  height:calc(100vh - 72px);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  height:100%;
}

/* BOX */

.box{
  background:#fff;
  border:1px solid #ededed;
  border-radius:22px;
  overflow:hidden;

  display:flex;
  flex-direction:column;

  box-shadow:0 4px 12px rgba(0,0,0,.03);
}

.box-head{
  padding:18px 20px;
  border-bottom:1px solid #f1f1f1;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.box-title{
  font-size:16px;
  font-weight:600;
}

.box-sub{
  font-size:12px;
  color:#999;
}

/* LEFT */

.question-box{
  height:100%;
}

.upload-area{
  flex:1;
  margin:18px;
  border:2px dashed #dddddd;
  border-radius:18px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  cursor:pointer;
}

.upload-area svg{
  width:58px;
  height:58px;
  stroke:#b8b8b8;
  fill:none;
  stroke-width:1.5;
}

.upload-area p{
  margin-top:16px;
  text-align:center;
  line-height:1.8;
  color:#777;
}

.upload-area strong{
  color:#333;
}

#fileInp{
  display:none;
}

.q-preview{
  display:none;
  flex:1;
  overflow:auto;
  padding:14px;
}

.q-preview img{
  width:100%;
  border-radius:16px;
}

/* RIGHT */

.workspace{
  height:100%;
}

/* TOOLBAR */

.toolbar{
  padding:14px;
  border-bottom:1px solid #f0f0f0;

  display:flex;
  align-items:center;
  gap:10px;
}

.tool{
  border:none;
  padding:10px 18px;
  border-radius:14px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.tool.pencil{
  background:#ffe8d9;
  color:#d56b00;
}

.tool.eraser{
  background:#e8f1ff;
  color:#3c6fd1;
}

.tool.note{
  background:#fff4c7;
  color:#9a7300;
}

.tool.clear{
  background:#ffe3e3;
  color:#c73a3a;
}

.size-wrap{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}

.size-wrap span{
  font-size:12px;
  color:#777;
}

/* MAIN DRAW */

.main-canvas-wrap{
  position:relative;
  height:240px;

  background:
  repeating-linear-gradient(
    to bottom,
    #ffffff 0px,
    #ffffff 31px,
    #f2f2f2 32px
  );

  border-bottom:1px solid #f1f1f1;
}

#wsCanvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

/* NOTES */

.notes-area{
  flex:1;
  overflow-y:auto;
  padding:0 14px 14px;
}

.notes-title{
  font-size:12px;
  font-weight:600;
  color:#888;

  padding:14px 0 10px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* NOTE CARD */

.note-card{
  background:#fff;
  border:1px solid #f0f0f0;
  border-radius:18px;
  overflow:hidden;
}

.note-head{
  padding:14px;

  display:flex;
  align-items:center;
  gap:10px;

  background:#f9fbff;
  border-bottom:1px solid #f0f0f0;
}

.note-num{
  width:30px;
  height:30px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:12px;
  font-weight:700;

  background:#dceeff;
  color:#1565c0;
}

.note-head h3{
  font-size:15px;
}

.note-body{
  height:155px;
  position:relative;

  background:
  repeating-linear-gradient(
    to bottom,
    #fff 0px,
    #fff 31px,
    #f3f3f3 32px
  );
}

.note-body canvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.note-footer{
  padding:10px;
  border-top:1px solid #f0f0f0;

  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.small-btn{
  border:none;
  padding:7px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.small-btn.black{
  background:#ececec;
}

.small-btn.gray{
  background:#f5f5f5;
}

.small-btn.red{
  background:#ffe7e7;
  color:#d33;
}

.small-btn.gold{
  background:#fff2c9;
  color:#9d7400;
}

/* STICKY */

.sticky{
  position:absolute;
  width:130px;
  min-height:95px;

  background:#fff6b7;
  border-radius:14px;

  padding:10px;

  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.sticky textarea{
  width:100%;
  height:65px;

  border:none;
  background:transparent;
  resize:none;
  outline:none;

  font-size:12px;
  font-family:'Poppins',sans-serif;
}

/* MOBILE */

@media(max-width:1000px){

  body{
    overflow:auto;
  }

  .grid{
    grid-template-columns:1fr;
    height:auto;
  }

  .notes-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="nav">

  <div class="brand">

    <img src="camila.png" class="logo">

    <div class="brand-text">
      <h1>2nd PU Accountancy</h1>
      <span>Camila Paul</span>
    </div>

  </div>

<div class="nav-right">

 

  <a href="Revaluation.html">
    <button class="nav-btn">
      Revaluation A/c
    </button>
  </a>

  <a href="partners capital.html">
    <button class="nav-btn">
      Partners Capital
    </button>
  </a>

  <a href="balance sheet.html">
    <button class="nav-btn">
      Balance Sheet
    </button>
  </a>

</div>

</nav>

<!-- MAIN -->

<div class="main">

  <div class="grid">

    <!-- LEFT -->

    <div class="box question-box">

      <div class="box-head">

        <div class="box-title">Question Image</div>

        <div class="box-sub">
          Upload image • stays visible while solving
        </div>

      </div>

      <div class="upload-area"
      onclick="document.getElementById('fileInp').click()">

        <svg viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>

        <p>
          <strong>Click to upload question</strong><br>
          PNG • JPG • PDF
        </p>

      </div>

      <input type="file" id="fileInp" accept="image/*">

      <div class="q-preview" id="preview">
        <img id="qImg">
      </div>

    </div>

    <!-- RIGHT -->

    <div class="box workspace">

      <div class="box-head">

        <div class="box-title">Working Space</div>

        <div class="box-sub">
          Draw • Erase • Notes
        </div>

      </div>

      <!-- TOOLBAR -->

      <div class="toolbar">

        <button class="tool pencil" id="pencilBtn">
          ✏ Pencil
        </button>

        <button class="tool eraser" id="eraserBtn">
          🧽 Eraser
        </button>

        <button class="tool note"
        onclick="addSticky(mainWrap)">
          ＋ Add Note
        </button>

        <button class="tool clear"
        onclick="clearMain()">
          🗑 Clear
        </button>

        <div class="size-wrap">
          <span>Size</span>
          <input type="range" min="1" max="12" value="2" id="sizeSlider">
        </div>

      </div>

      <!-- MAIN CANVAS -->

      <div class="main-canvas-wrap" id="mainWrap">
        <canvas id="wsCanvas"></canvas>
      </div>

      <!-- NOTES -->

      <div class="notes-area">

        <div class="notes-title">
          Working Notes
        </div>

        <div class="notes-grid">

          <!-- NOTE 1 -->

          <div class="note-card">

            <div class="note-head">
              <div class="note-num">1</div>
              <h3>Working Note 1</h3>
            </div>

            <div class="note-body">
              <canvas></canvas>
            </div>

            <div class="note-footer">

              <button class="small-btn black">Pencil</button>

              <button class="small-btn gray">Eraser</button>

              <button class="small-btn red">Clear</button>

              <button class="small-btn gold">Note</button>

            </div>

          </div>

          <!-- NOTE 2 -->

          <div class="note-card">

            <div class="note-head">
              <div class="note-num">2</div>
              <h3>Working Note 2</h3>
            </div>

            <div class="note-body">
              <canvas></canvas>
            </div>

            <div class="note-footer">

              <button class="small-btn black">Pencil</button>

              <button class="small-btn gray">Eraser</button>

              <button class="small-btn red">Clear</button>

              <button class="small-btn gold">Note</button>

            </div>

          </div>

          <!-- NOTE 3 -->

          <div class="note-card">

            <div class="note-head">
              <div class="note-num">3</div>
              <h3>Working Note 3</h3>
            </div>

            <div class="note-body">
              <canvas></canvas>
            </div>

            <div class="note-footer">

              <button class="small-btn black">Pencil</button>

              <button class="small-btn gray">Eraser</button>

              <button class="small-btn red">Clear</button>

              <button class="small-btn gold">Note</button>

            </div>

          </div>

          <!-- NOTE 4 -->

          <div class="note-card">

            <div class="note-head">
              <div class="note-num">4</div>
              <h3>Working Note 4</h3>
            </div>

            <div class="note-body">
              <canvas></canvas>
            </div>

            <div class="note-footer">

              <button class="small-btn black">Pencil</button>

              <button class="small-btn gray">Eraser</button>

              <button class="small-btn red">Clear</button>

              <button class="small-btn gold">Note</button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* IMAGE PREVIEW */

const fileInp = document.getElementById('fileInp');

fileInp.addEventListener('change', function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(ev){

    document.querySelector('.upload-area').style.display='none';

    document.getElementById('preview').style.display='block';

    document.getElementById('qImg').src = ev.target.result;

  }

  reader.readAsDataURL(file);

});

/* MAIN CANVAS */

const canvas = document.getElementById('wsCanvas');
const ctx = canvas.getContext('2d');

const mainWrap = document.getElementById('mainWrap');

let drawing = false;
let tool = 'pencil';
let size = 2;

function resizeCanvas(){

  canvas.width = mainWrap.offsetWidth;
  canvas.height = mainWrap.offsetHeight;

}

resizeCanvas();

window.addEventListener('resize', resizeCanvas);

function getPos(e, targetCanvas){

  const rect = targetCanvas.getBoundingClientRect();

  return{
    x:(e.touches ? e.touches[0].clientX : e.clientX)-rect.left,
    y:(e.touches ? e.touches[0].clientY : e.clientY)-rect.top
  };

}

let lastX,lastY;

/* MAIN START */

canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('touchstart',startDraw);

function startDraw(e){

  drawing = true;

  const pos = getPos(e, canvas);

  lastX = pos.x;
  lastY = pos.y;

}

/* MAIN DRAW */

canvas.addEventListener('mousemove',drawMain);
canvas.addEventListener('touchmove',drawMain);

function drawMain(e){

  if(!drawing) return;

  e.preventDefault();

  const pos = getPos(e, canvas);

  ctx.beginPath();

  ctx.globalCompositeOperation =
  tool === 'eraser'
  ? 'destination-out'
  : 'source-over';

  ctx.strokeStyle = '#ff6b35';

  ctx.lineWidth =
  tool === 'eraser'
  ? size * 10
  : size + 2;

  ctx.lineCap = 'round';

  ctx.moveTo(lastX,lastY);
  ctx.lineTo(pos.x,pos.y);

  ctx.stroke();

  lastX = pos.x;
  lastY = pos.y;

}

window.addEventListener('mouseup',()=>drawing=false);
window.addEventListener('touchend',()=>drawing=false);

/* TOOL BUTTONS */

document.getElementById('pencilBtn').onclick = ()=>{

  tool='pencil';

};

document.getElementById('eraserBtn').onclick = ()=>{

  tool='eraser';

};

document.getElementById('sizeSlider').oninput = (e)=>{

  size = parseInt(e.target.value);

};

function clearMain(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

}

/* NOTE CARDS */

const noteCards = document.querySelectorAll('.note-card');

noteCards.forEach((card)=>{

  const noteCanvas = card.querySelector('canvas');
  const body = card.querySelector('.note-body');

  const pencilBtn = card.querySelector('.black');
  const eraserBtn = card.querySelector('.gray');
  const clearBtn = card.querySelector('.red');
  const noteBtn = card.querySelector('.gold');

  noteCanvas.width = body.offsetWidth;
  noteCanvas.height = body.offsetHeight;

  const noteCtx = noteCanvas.getContext('2d');

  let noteDrawing = false;
  let noteTool = 'pencil';

  let lx,ly;

  function getNotePos(e){

    const rect = noteCanvas.getBoundingClientRect();

    return{
      x:(e.touches ? e.touches[0].clientX : e.clientX)-rect.left,
      y:(e.touches ? e.touches[0].clientY : e.clientY)-rect.top
    };

  }

  noteCanvas.addEventListener('mousedown',startNote);
  noteCanvas.addEventListener('touchstart',startNote);

  function startNote(e){

    noteDrawing = true;

    const p = getNotePos(e);

    lx = p.x;
    ly = p.y;

  }

  noteCanvas.addEventListener('mousemove',drawNote);
  noteCanvas.addEventListener('touchmove',drawNote);

  function drawNote(e){

    if(!noteDrawing) return;

    e.preventDefault();

    const p = getNotePos(e);

    noteCtx.beginPath();

    noteCtx.globalCompositeOperation =
    noteTool === 'eraser'
    ? 'destination-out'
    : 'source-over';

    noteCtx.strokeStyle = '#222';

    noteCtx.lineWidth =
    noteTool === 'eraser'
    ? 18
    : 2;

    noteCtx.lineCap = 'round';

    noteCtx.moveTo(lx,ly);
    noteCtx.lineTo(p.x,p.y);

    noteCtx.stroke();

    lx = p.x;
    ly = p.y;

  }

  window.addEventListener('mouseup',()=>noteDrawing=false);
  window.addEventListener('touchend',()=>noteDrawing=false);

  /* BUTTONS */

  pencilBtn.onclick = ()=>{

    noteTool='pencil';

  };

  eraserBtn.onclick = ()=>{

    noteTool='eraser';

  };

  clearBtn.onclick = ()=>{

    noteCtx.clearRect(0,0,noteCanvas.width,noteCanvas.height);

  };

  noteBtn.onclick = ()=>{

    addSticky(body);

  };

});

/* STICKY */

function addSticky(parent){

  const note=document.createElement('div');

  note.className='sticky';

  note.style.left='20px';
  note.style.top='20px';

  note.innerHTML=`
  <textarea placeholder="Write here..."></textarea>
  `;

  parent.appendChild(note);

  dragElement(note);

}

/* DRAG */

function dragElement(el){

  let pos1 = 0,
      pos2 = 0,
      pos3 = 0,
      pos4 = 0;

  el.onmousedown = dragMouseDown;

  function dragMouseDown(e){

    e.preventDefault();

    pos3 = e.clientX;
    pos4 = e.clientY;

    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;

  }

  function elementDrag(e){

    e.preventDefault();

    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;

    pos3 = e.clientX;
    pos4 = e.clientY;

    el.style.top = (el.offsetTop - pos2) + "px";
    el.style.left = (el.offsetLeft - pos1) + "px";

  }

  function closeDragElement(){

    document.onmouseup = null;
    document.onmousemove = null;

  }

}

</script>

</body>
</html>
