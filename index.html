<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2nd PU Accountancy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#fafafa;
  overflow:hidden;
}

/* NAVBAR */

.nav{
  height:72px;
  background:#fff;
  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 24px;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:46px;
  height:46px;
  border-radius:50%;
  object-fit:cover;
}

.brand-text h1{
  font-size:22px;
}

.brand-text span{
  font-size:12px;
  color:#777;
}

.nav-right{
  display:flex;
  gap:10px;
}

.nav-btn{
  border:none;
  padding:10px 18px;
  border-radius:12px;
  background:#f5f5f5;
  cursor:pointer;
}

/* MAIN */

.main{
  padding:16px;
  height:calc(100vh - 72px);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  height:100%;
}

/* BOX */

.box{
  background:#fff;
  border-radius:22px;
  border:1px solid #ededed;

  display:flex;
  flex-direction:column;

  overflow:hidden;
}

.box-head{
  padding:18px;
  border-bottom:1px solid #f1f1f1;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.box-title{
  font-size:16px;
  font-weight:600;
}

.box-sub{
  font-size:12px;
  color:#888;
}

/* QUESTION */

.upload-area{
  flex:1;

  margin:18px;

  border:2px dashed #ddd;
  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
}

.upload-area p{
  text-align:center;
  color:#777;
  line-height:1.8;
}

#fileInp{
  display:none;
}

.q-preview{
  display:none;
  flex:1;
  overflow:auto;
  padding:14px;
}

.q-preview img{
  width:100%;
  border-radius:16px;
}

/* TOOLBAR */

.toolbar{
  padding:14px;
  border-bottom:1px solid #f0f0f0;

  display:flex;
  align-items:center;
  gap:10px;
}

.tool{
  border:none;
  padding:10px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.pencil{
  background:#ffe8d9;
}

.eraser{
  background:#e7f0ff;
}

.note{
  background:#fff2c7;
}

.clear{
  background:#ffe5e5;
}

.add-card{
  background:#dcffe5;
}

.size-wrap{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}

/* MAIN CANVAS */

.main-canvas-wrap{
  position:relative;
  height:240px;

  background:
  repeating-linear-gradient(
    to bottom,
    #fff 0px,
    #fff 31px,
    #f1f1f1 32px
  );
}

#wsCanvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

/* NOTES */

.notes-area{
  flex:1;
  overflow-y:auto;
  padding:14px;
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* CARD */

.note-card{
  border:1px solid #eee;
  border-radius:18px;
  overflow:hidden;
  background:#fff;
}

.note-head{
  padding:14px;
  background:#f8fbff;
  border-bottom:1px solid #eee;

  display:flex;
  align-items:center;
  gap:10px;
}

.note-num{
  width:30px;
  height:30px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#dceeff;
  color:#1565c0;
  font-size:12px;
  font-weight:700;
}

.note-body{
  height:180px;
  position:relative;

  background:
  repeating-linear-gradient(
    to bottom,
    #fff 0px,
    #fff 31px,
    #f3f3f3 32px
  );
}

.note-body canvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.note-footer{
  padding:10px;
  border-top:1px solid #eee;

  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.small-btn{
  border:none;
  padding:7px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}

.black{
  background:#eee;
}

.gray{
  background:#f5f5f5;
}

.red{
  background:#ffe5e5;
}

.gold{
  background:#fff2c7;
}

/* STICKY */

.sticky{
  position:absolute;

  width:150px;
  min-height:130px;

  background:#fff3a6;

  border-radius:16px;

  padding:10px;

  box-shadow:0 4px 10px rgba(0,0,0,.08);

  z-index:100;
}

.sticky-top{
  display:flex;
  justify-content:flex-end;
  margin-bottom:5px;
}

.sticky-clear{
  width:22px;
  height:22px;

  border:none;
  border-radius:50%;

  background:#ffdddd;
  color:#d33;

  cursor:pointer;
}

.sticky textarea{
  width:100%;
  height:80px;

  border:none;
  outline:none;
  resize:none;

  background:transparent;

  font-family:'Poppins',sans-serif;
  font-size:13px;
}

/* MOBILE */

@media(max-width:1000px){

  body{
    overflow:auto;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .notes-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<nav class="nav">

  <div class="brand">

    <img src="camila.png" class="logo">

    <div class="brand-text">
      <h1>2nd PU Accountancy</h1>
      <span>Camila Paul</span>
    </div>

  </div>

 <div class="nav-right">

  <button class="nav-btn"
  onclick="window.location.href='revaluation.html'">
    Revaluation
  </button>

  <button class="nav-btn"
  onclick="window.location.href='partners capital.html'">
    Capital A/c
  </button>

  <button class="nav-btn"
  onclick="window.location.href='balance sheet.html'">
    Balance Sheet
  </button>

</div>

</nav>

<div class="main">

  <div class="grid">

    <!-- LEFT -->

    <div class="box">

      <div class="box-head">

        <div class="box-title">Question Image</div>

        <div class="box-sub">
          Upload image
        </div>

      </div>

      <div class="upload-area"
      onclick="document.getElementById('fileInp').click()">

        <p>
          <strong>Click to Upload</strong><br>
          PNG • JPG
        </p>

      </div>

      <input type="file" id="fileInp" accept="image/*">

      <div class="q-preview" id="preview">
        <img id="qImg">
      </div>

    </div>

    <!-- RIGHT -->

    <div class="box">

      <div class="box-head">

        <div class="box-title">Working Space</div>

        <div class="box-sub">
          Draw • Notes
        </div>

      </div>

      <div class="toolbar">

        <button class="tool pencil" id="pencilBtn">
          ✏ Pencil
        </button>

        <button class="tool eraser" id="eraserBtn">
          🧽 Eraser
        </button>

        <button class="tool note"
        onclick="addSticky(mainWrap)">
          📝 Add Note
        </button>

        <button class="tool clear"
        onclick="clearMain()">
          🗑 Clear
        </button>

        <button class="tool add-card"
        onclick="createWorkingNote()">
          ＋ Add Working Note
        </button>

        <div class="size-wrap">

          <span>Size</span>

          <input type="range"
          min="1"
          max="12"
          value="2"
          id="sizeSlider">

        </div>

      </div>

      <div class="main-canvas-wrap" id="mainWrap">
        <canvas id="wsCanvas"></canvas>
      </div>

      <div class="notes-area">

        <div class="notes-grid" id="notesGrid">

        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* IMAGE */

const fileInp = document.getElementById('fileInp');

fileInp.addEventListener('change',function(e){

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(ev){

    document.querySelector('.upload-area').style.display='none';

    document.getElementById('preview').style.display='block';

    document.getElementById('qImg').src = ev.target.result;

  }

  reader.readAsDataURL(file);

});

/* MAIN CANVAS */

const canvas = document.getElementById('wsCanvas');
const ctx = canvas.getContext('2d');

const mainWrap = document.getElementById('mainWrap');

let drawing=false;
let tool='pencil';
let size=2;

function resizeCanvas(){

  canvas.width = mainWrap.offsetWidth;
  canvas.height = mainWrap.offsetHeight;

}

resizeCanvas();

window.addEventListener('resize',resizeCanvas);

function getPos(e,target){

  const rect = target.getBoundingClientRect();

  return{

    x:(e.touches ? e.touches[0].clientX : e.clientX)-rect.left,

    y:(e.touches ? e.touches[0].clientY : e.clientY)-rect.top

  };

}

let lx,ly;

canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('touchstart',startDraw);

function startDraw(e){

  drawing=true;

  const p=getPos(e,canvas);

  lx=p.x;
  ly=p.y;

}

canvas.addEventListener('mousemove',draw);
canvas.addEventListener('touchmove',draw);

function draw(e){

  if(!drawing) return;

  e.preventDefault();

  const p=getPos(e,canvas);

  ctx.beginPath();

  ctx.globalCompositeOperation=
  tool==='eraser'
  ? 'destination-out'
  : 'source-over';

  ctx.strokeStyle='#ff6b35';

  ctx.lineWidth=
  tool==='eraser'
  ? size*10
  : size+2;

  ctx.lineCap='round';

  ctx.moveTo(lx,ly);
  ctx.lineTo(p.x,p.y);

  ctx.stroke();

  lx=p.x;
  ly=p.y;

}

window.addEventListener('mouseup',()=>drawing=false);
window.addEventListener('touchend',()=>drawing=false);

document.getElementById('pencilBtn').onclick=()=>{

  tool='pencil';

};

document.getElementById('eraserBtn').onclick=()=>{

  tool='eraser';

};

document.getElementById('sizeSlider').oninput=(e)=>{

  size=parseInt(e.target.value);

};

function clearMain(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

}

/* WORKING NOTES */

let noteCount=0;

function createWorkingNote(){

  noteCount++;

  const grid=document.getElementById('notesGrid');

  const card=document.createElement('div');

  card.className='note-card';

  card.innerHTML=`

    <div class="note-head">

      <div class="note-num">${noteCount}</div>

      <h3>Working Note ${noteCount}</h3>

    </div>

    <div class="note-body">
      <canvas></canvas>
    </div>

    <div class="note-footer">

      <button class="small-btn black">
        Pencil
      </button>

      <button class="small-btn gray">
        Eraser
      </button>

      <button class="small-btn red">
        Clear
      </button>

      <button class="small-btn gold">
        Note
      </button>

    </div>

  `;

  grid.appendChild(card);

  setupNoteCard(card);

}

/* NOTE CARD FUNCTION */

function setupNoteCard(card){

  const canvas=card.querySelector('canvas');

  const body=card.querySelector('.note-body');

  canvas.width=body.offsetWidth;
  canvas.height=body.offsetHeight;

  const ctx=canvas.getContext('2d');

  let drawing=false;
  let tool='pencil';

  let lx,ly;

  function getPos(e){

    const rect=canvas.getBoundingClientRect();

    return{

      x:(e.touches ? e.touches[0].clientX : e.clientX)-rect.left,

      y:(e.touches ? e.touches[0].clientY : e.clientY)-rect.top

    };

  }

  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('touchstart',start);

  function start(e){

    drawing=true;

    const p=getPos(e);

    lx=p.x;
    ly=p.y;

  }

  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('touchmove',draw);

  function draw(e){

    if(!drawing) return;

    e.preventDefault();

    const p=getPos(e);

    ctx.beginPath();

    ctx.globalCompositeOperation=
    tool==='eraser'
    ? 'destination-out'
    : 'source-over';

    ctx.strokeStyle='#222';

    ctx.lineWidth=
    tool==='eraser'
    ? 18
    : 2;

    ctx.lineCap='round';

    ctx.moveTo(lx,ly);
    ctx.lineTo(p.x,p.y);

    ctx.stroke();

    lx=p.x;
    ly=p.y;

  }

  window.addEventListener('mouseup',()=>drawing=false);
  window.addEventListener('touchend',()=>drawing=false);

  const pencilBtn=card.querySelector('.black');
  const eraserBtn=card.querySelector('.gray');
  const clearBtn=card.querySelector('.red');
  const noteBtn=card.querySelector('.gold');

  pencilBtn.onclick=()=>{

    tool='pencil';

  };

  eraserBtn.onclick=()=>{

    tool='eraser';

  };

  clearBtn.onclick=()=>{

    ctx.clearRect(0,0,canvas.width,canvas.height);

  };

  noteBtn.onclick=()=>{

    addSticky(body);

  };

}

/* STICKY */

function addSticky(parent){

  const note=document.createElement('div');

  note.className='sticky';

  note.style.left='20px';
  note.style.top='20px';

  note.innerHTML=`

    <div class="sticky-top">

      <button class="sticky-clear">
        ✕
      </button>

    </div>

    <textarea
    placeholder="Write here..."></textarea>

  `;

  parent.appendChild(note);

  const textarea=note.querySelector('textarea');

  const clearBtn=note.querySelector('.sticky-clear');

  clearBtn.onclick=()=>{

    note.remove();

  };

  textarea.addEventListener('mousedown',(e)=>{

    e.stopPropagation();

  });

  textarea.addEventListener('touchstart',(e)=>{

    e.stopPropagation();

  });

  dragElement(note);

}

/* DRAG */

function dragElement(el){

  let startX=0;
  let startY=0;
  let initialX=0;
  let initialY=0;

  el.addEventListener('mousedown',dragStart);
  el.addEventListener('touchstart',dragStart);

  function dragStart(e){

    if(e.target.tagName==='TEXTAREA') return;

    e.preventDefault();

    initialX=
    e.touches ? e.touches[0].clientX : e.clientX;

    initialY=
    e.touches ? e.touches[0].clientY : e.clientY;

    document.addEventListener('mousemove',drag);
    document.addEventListener('mouseup',dragEnd);

    document.addEventListener('touchmove',drag);
    document.addEventListener('touchend',dragEnd);

  }

  function drag(e){

    e.preventDefault();

    startX=
    (e.touches ? e.touches[0].clientX : e.clientX)-initialX;

    startY=
    (e.touches ? e.touches[0].clientY : e.clientY)-initialY;

    initialX=
    e.touches ? e.touches[0].clientX : e.clientX;

    initialY=
    e.touches ? e.touches[0].clientY : e.clientY;

    el.style.top=(el.offsetTop+startY)+"px";
    el.style.left=(el.offsetLeft+startX)+"px";

  }

  function dragEnd(){

    document.removeEventListener('mousemove',drag);
    document.removeEventListener('mouseup',dragEnd);

    document.removeEventListener('touchmove',drag);
    document.removeEventListener('touchend',dragEnd);

  }

}

/* DEFAULT NOTES */

createWorkingNote();
createWorkingNote();
createWorkingNote();
createWorkingNote();

</script>

</body>
</html>
